<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile</title>
  <link rel="stylesheet" href="/static/css/index.css">
  <style>
    /* ===== Profile Page Styles ===== */
    body { background: #f0f2f5; font-family: system-ui, -apple-system, sans-serif; margin: 0; }

    .profile-container {
      max-width: 760px;
      margin: 80px auto 60px;
      padding: 0 16px;
    }

    /* PROFILE CARD */
    .profile-card {
      background: #fff;
      border-radius: 20px;
      padding: 28px 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    .profile-top {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    .profile-avatar-lg {
      width: 96px; height: 96px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #e3e8ee;
      flex-shrink: 0;
    }

    .profile-info { flex: 1; min-width: 180px; }

    .profile-info h2 { margin: 0 0 6px; font-size: 22px; color: #1a1a2e; }

    .profile-bio { color: #555; font-size: 14px; margin: 0 0 6px; }

    .profile-website { font-size: 13px; color: #1877f2; text-decoration: none; }
    .profile-website:hover { text-decoration: underline; }

    .btn-follow {
      margin-top: 12px;
      padding: 8px 24px;
      border-radius: 20px;
      border: 2px solid #1877f2;
      background: #1877f2;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s;
      display: none;
    }
    .btn-follow.following { background: #fff; color: #1877f2; }
    .btn-follow:hover { opacity: 0.85; }
    .btn-follow:disabled { opacity: 0.5; cursor: default; }

    /* STATS */
    .profile-stats {
      display: flex;
      gap: 0;
      border-top: 1px solid #eee;
      padding-top: 16px;
      flex-wrap: wrap;
    }
    .stat {
      display: flex; flex-direction: column; align-items: center;
      flex: 1; min-width: 80px; padding: 8px;
    }
    .stat span { font-size: 20px; font-weight: 700; color: #1a1a2e; }
    .stat label { font-size: 12px; color: #888; margin-top: 2px; }

    /* TABS */
    .profile-tabs {
      display: flex; border-bottom: 2px solid #e3e8ee; margin-bottom: 16px;
    }
    .profile-tab-btn {
      padding: 10px 28px; border: none; background: none;
      font-size: 15px; font-weight: 600; color: #888;
      cursor: pointer; border-bottom: 3px solid transparent;
      margin-bottom: -2px; transition: 0.2s;
    }
    .profile-tab-btn.active { color: #1877f2; border-bottom-color: #1877f2; }

    .tab-content { min-height: 200px; }

    /* POST CARD */
    .profile-post-card {
      background: #fff; border-radius: 16px; padding: 16px;
      margin-bottom: 14px; box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      border: 1px solid #eee;
    }
    .ppc-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .ppc-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; cursor: pointer; }
    .ppc-name { font-weight: 600; font-size: 14px; cursor: pointer; }
    .ppc-time { font-size: 12px; color: #888; }
    .ppc-content { font-size: 15px; color: #333; line-height: 1.6; margin-bottom: 10px; }
    .ppc-images { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px,1fr)); gap: 8px; margin-bottom: 10px; }
    .ppc-img { width: 100%; height: 100px; object-fit: cover; border-radius: 10px; }
    .ppc-stats { font-size: 13px; color: #888; }

    /* ARTICLE CARD */
    .profile-article-card {
      display: flex; gap: 14px; background: #fff;
      border-radius: 16px; padding: 14px; margin-bottom: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06); border: 1px solid #eee;
      cursor: pointer; transition: transform 0.2s;
    }
    .profile-article-card:hover { transform: translateY(-3px); }
    .pac-img { width: 90px; height: 90px; object-fit: cover; border-radius: 12px; flex-shrink: 0; }
    .pac-title { font-weight: 700; font-size: 15px; margin-bottom: 4px; color: #1a1a2e; }
    .pac-meta { font-size: 12px; color: #888; margin-bottom: 6px; }
    .pac-preview { font-size: 13px; color: #555; line-height: 1.5; }

    /* STATES */
    .feed-loading { text-align: center; padding: 40px; color: #888; }
    .empty-state { text-align: center; padding: 40px; color: #aaa; font-size: 15px; }

    /* ARTICLE MODAL */
    .article-modal {
      position: fixed;
      z-index: 9999;
      left: 0; top: 0; width: 100%; height: 100%;
      overflow: auto;
      background-color: rgba(0,0,0,0.6);
      display: none;
      align-items: center; justify-content: center;
    }
    .article-modal-content {
      background: #fff;
      border-radius: 12px;
      max-width: 600px;
      width: 90%;
      padding: 20px;
      position: relative;
    }
    .article-modal-close {
      position: absolute;
      top: 12px;
      right: 16px;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
    }
    #modal-article-body { margin-top: 12px; white-space: pre-wrap; }

    @media (max-width: 500px) {
      .profile-top { flex-direction: column; align-items: center; text-align: center; }
      .profile-stats { justify-content: center; }
    }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div id="profile-root" class="profile-container">

    <div class="profile-card">
      <div class="profile-top">
        <img id="profile-avatar" src="/static/img/avatar.png"
             class="profile-avatar-lg"
             onerror="this.src='/static/img/avatar.png'" alt="avatar">
        <div class="profile-info">
          <h2 id="profile-name" data-translate="feed.loading">Loading…</h2>
          <p id="profile-bio" class="profile-bio"></p>
          <a id="profile-website" class="profile-website" target="_blank" rel="noopener" style="display:none"></a>
          <button id="follow-btn" class="btn-follow" data-translate="profile.follow">Follow</button>
        </div>
      </div>

      <div class="profile-stats">
        <div class="stat"><span id="stat-posts">0</span><label data-translate="navbar.posts">Posts</label></div>
        <div class="stat"><span id="stat-articles">0</span><label data-translate="navbar.articles">Articles</label></div>
        <div class="stat"><span id="stat-followers">0</span><label data-translate="profile.followers">Followers</label></div>
        <div class="stat"><span id="stat-following">0</span><label data-translate="profile.following">Following</label></div>
      </div>
    </div>

    <div class="profile-tabs">
      <button class="profile-tab-btn active" data-tab="posts">📝 <span data-translate="navbar.posts">Posts</span></button>
      <button class="profile-tab-btn" data-tab="articles">📰 <span data-translate="navbar.articles">Articles</span></button>
    </div>

    <div id="tab-content" class="tab-content">
      <div class="feed-loading" data-translate="feed.loading">Loading…</div>
    </div>

  </div>

  <div id="article-modal" class="article-modal">
    <div class="article-modal-content">
      <span id="article-modal-close" class="article-modal-close">&times;</span>
      <h3 id="modal-article-title"></h3>
      <p id="modal-article-meta"></p>
      <div id="modal-article-body"></div>
    </div>
  </div>

  <script src="/static/js/fp.js" defer></script>
  <script src="/static/js/loader.js" defer></script>
  <script src="/static/js/login_sign.js" defer></script>
  <script src="/static/js/navbar.js" defer></script>
  <script src="/static/js/lang.js"></script>
  <script src="/static/js/notifications.js" defer></script>
  <script src="/static/js/userprofile.js" type="module" defer></script>
</body>
</html>
