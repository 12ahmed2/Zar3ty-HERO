<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title data-translate="gradients.profile">Zar3ty - Profile</title>
  <link rel="stylesheet" href="/static/css/profile.css">
  <link rel="stylesheet" href="/static/css/index.css">
  
  <!-- Load translation system FIRST -->
  <script src="/static/js/lang.js"></script>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <main class="container profile-wrap">
    <div class="profile-toggle">
      <button id="btn-show-profile" class="btn active" data-translate="gradients.profile">Profile</button>
      <button id="btn-show-robot" class="btn ghost" data-translate="navbar.bot">Robot</button>
    </div>

    <div id="profile-section">
      <section class="card profile-card">
        <h2 data-translate="gradients.profile">Profile</h2>
        <form id="form-profile" class="vstack gap">
          <label>
            <span data-translate="auth.login.email">Email</span>
            <input id="pf-email" type="email" readonly data-translate-placeholder="auth.login.email" placeholder="Email">
          </label>
          <label>
            <span data-translate="auth.signup.fullname">Full Name</span>
            <input id="pf-fullname" type="text" required maxlength="200" data-translate-placeholder="auth.signup.fullname" placeholder="Full Name">
          </label>
          <div class="hstack gap">
            <button class="btn" type="submit" data-translate="gradients.savechange">Save changes</button>
            <a class="btn ghost" href="/" data-translate="gradients.cancel">Cancel</a>
          </div>
          <p id="pf-msg" class="hint"></p>
        </form>
      </section>

      <section class="card orders-card">
        <h2 data-translate="gradients.myorders">My Orders</h2>
        <p id="orders-msg" class="hint" data-translate="feed.loading">Loading…</p>
        <div id="orders-list" class="vstack gap"></div>
      </section>

      <section id="my-enrollments" class="card courses-grid">
        <h2 data-translate="gradients.mycourses">My Courses</h2>
        <!-- Courses will be loaded here by profile.js -->
      </section>
    </div>

    <section id="robot-section" class="card robot-card" style="display: none;">
      <h2 data-translate="navbar.bot">Robot Dashboard</h2>
      <div class="vstack gap">
        <div class="hstack gap robot-controls">
          <input id="robot-cam-url" type="url" 
                 data-translate-placeholder="profile.robot.url_placeholder" 
                 placeholder="Enter Camera URL (e.g., https://...)" 
                 style="flex-grow: 1;">
          <button id="btn-show-camera" class="btn" data-translate="profile.robot.show_camera">Show Camera</button>
          <button id="btn-robot-fullscreen" class="btn ghost" data-translate="profile.robot.fullscreen">Fullscreen</button>
        </div>
        <div class="robot-frame-wrapper" id="robot-frame-container">
          <iframe id="robot-iframe" src="" frameborder="0" allowfullscreen allow="fullscreen"></iframe>
        </div>
      </div>
    </section>
  </main>
  
  <!-- Scripts in correct order -->
  <script src="/static/js/loader.js" defer></script>
  <script src="/static/js/fp.js" defer></script>
  <script src="/static/js/navbar.js" defer></script>
  <script src="/static/js/profile.js" type="module" defer></script>
</body>
</html>
