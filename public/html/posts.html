<!doctype html>

<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Zar3ty - Posts</title>

  <!-- Global styles -->
  <link rel="stylesheet" href="/static/css/index.css">

  <!-- Posts styles (scoped) -->
  <link rel="stylesheet" href="/static/css/posts.css">
</head>

<body class="page-posts">

  <!-- Navbar -->
  <div id="navbar-placeholder"></div>

  <div class="main-container">
    <h1 class="header-title">Discussions</h1>

    <!-- POSTS FEED -->
    <div id="posts-list" class="feed-list"></div>

    <!-- FLOATING ADD BUTTON -->
    <button id="btn-add-post" class="button-fab">+</button>
  </div>

  <!-- =========================
       CREATE POST MODAL
       ========================= -->
  <div id="post-modal" class="modal-wrapper hidden">
    <div class="modal-box">
      <h2 class="modal-title">Create Post</h2>

      <textarea id="post-content" class="textarea-content" placeholder="What’s on your mind?"></textarea>
      <input type="file" id="post-images" class="input-file" multiple>

      <div class="button-row">
        <button id="post-submit" class="btn-primary">Post</button>
        <button id="post-close" class="btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <!-- =========================
       VIEW POST MODAL
       ========================= -->
  <div id="view-post-modal" class="modal-wrapper hidden">
    <div class="modal-box large">

      <!-- Post Content -->
      <div id="view-post-body" class="post-body-display"></div>

      <!-- COMMENTS -->
      <div class="comments-wrapper">

        <h3 class="comments-header">Comments</h3>

        <div id="comments-list" class="comments-feed"></div>

        <!-- COMMENT INPUT -->
        <div class="comment-box">
          <input id="comment-text" class="input-comment" placeholder="Write a comment...">
          <button id="send-comment" class="btn-primary">Send</button>
        </div>

      </div>

      <button id="close-view-post" class="btn-secondary">Close</button>
    </div>
  </div>

  <!-- Scripts -->
  <script src="/static/js/loader.js" defer></script>
  <script src="/static/js/lang.js"></script>
  <script src="/static/js/posts.js" type="module" defer></script>
  <script src="/static/js/navbar.js" defer></script>
  <script src="/static/js/login_sign.js" defer></script>
  <script src="/static/js/cart_drawer.js" defer></script>
  <script src="/static/js/notifcations.js" defer></script>
  <script src="/static/js/index.js" type="module" defer></script>

</body>
</html>
